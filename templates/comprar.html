<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Comprar Ingresso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <form method="POST" action="{{ url_for('comprar') }}" class="form-compra">
        <h2>Comprar Ingresso</h2>

        <div class="form-group">
            <label for="ingresso">Selecione o evento:</label>
            <select name="ingresso" id="ingresso" required>
                <option value="" disabled selected>Escolha um evento</option>
                {% for ingresso in ingressos %}
                    <option value="{{ ingresso.id }}">{{ ingresso.nome_evento }} - R$ {{ ingresso.preco }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit">Comprar</button>
    </form>
</body>
</html>
